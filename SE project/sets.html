<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Timetable Generator - Sets</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .timetable-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .timetable-cell {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--box-shadow);
            transition: transform 0.3s ease;
        }
        
        .timetable-cell:hover {
            transform: translateY(-5px);
        }
        
        .faculty-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            border-radius: var(--border-radius);
            overflow: hidden;
        }
        
        .faculty-table th,
        .faculty-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .faculty-table th {
            background-color: var(--primary-color);
            color: white;
        }
        
        .faculty-table tr:hover {
            background-color: #f5f5f5;
        }
        
        .set-selection {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .time-slot {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .subject-list {
            margin: 10px 0;
            color: var(--text-color);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .print-button {
            background-color: var(--secondary-color);
        }
        
        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-container no-print">
        <div class="nav-menu">
            <div class="nav-left">
                <a href="sets.html" class="active"><i class="fas fa-calendar-alt"></i> Timetables</a>
                <a href="home page.html#about"><i class="fas fa-info-circle"></i> About</a>
                <a href="home page.html#contact"><i class="fas fa-envelope"></i> Contact</a>
            </div>
            <div class="nav-right">
                <button class="btn btn-secondary" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Set Selection -->
        <div class="form-container fade-in set-selection">
            <h1><i class="fas fa-calendar-alt"></i> Select Your Set</h1>
            <p>Choose one of the following sets to generate your timetable:</p>
            
            <div class="form-group">
                <select id="setSelection" class="form-control" onchange="loadTimetable()">
                    <option value="">Select Set</option>
                    <option value="A">Set A</option>
                    <option value="B">Set B</option>
                    <option value="C">Set C</option>
                </select>
            </div>
        </div>

        <!-- Timetable Grid -->
        <div class="form-container fade-in" id="timetableContainer" style="display: none;">
            <h1><i class="fas fa-clock"></i> Timetable for Set <span id="selectedSet"></span></h1>
            <p>Select faculty members for each time slot:</p>
            
            <div class="timetable-grid" id="timetableGrid">
                <!-- Time slots will be dynamically inserted here -->
            </div>
            
            <div class="action-buttons">
                <button class="btn" onclick="generateTimetable()">
                    <i class="fas fa-check-circle"></i> Generate Timetable
                </button>
            </div>
            <p id="error_message" class="error"></p>
        </div>

        <!-- Faculty Selected Table -->
        <div class="form-container fade-in" id="facultyTableContainer" style="display: none;">
            <h1><i class="fas fa-users"></i> Generated Timetable for Set <span id="facultySet"></span></h1>
            <table class="faculty-table" id="facultyTable">
                <thead>
                    <tr>
                        <th>Time Slot</th>
                        <th>Subject</th>
                        <th>Faculty</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Selected faculties will be dynamically inserted here -->
                </tbody>
            </table>
            
            <div class="action-buttons no-print">
                <button class="btn" onclick="modifyTimetable()">
                    <i class="fas fa-edit"></i> Modify
                </button>
                <button class="btn print-button" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='home page.html'">
                    <i class="fas fa-home"></i> Back to Home
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer no-print">
            <p>&copy; 2025 College Timetable Generator | All Rights Reserved</p>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Define sets, their faculties, and subjects
        const sets = {
            A: [
                { time: "8:00 AM - 9:00 AM", subjects: ["Maths"], faculty: ["Faculty A1", "Faculty A2", "Faculty A3"] },
                { time: "9:00 AM - 10:00 AM", subjects: ["Physics"], faculty: ["Faculty A3", "Faculty A4", "Faculty A5", "Faculty A6"] },
                { time: "10:00 AM - 11:00 AM", subjects: ["Chemistry"], faculty: ["Faculty A4", "Faculty A5", "Faculty A6"] },
                { time: "11:00 AM - 12:00 PM", subjects: ["Computer Science"], faculty: ["Faculty A1", "Faculty A2", "Faculty A3", "Faculty A4", "Faculty A5", "Faculty A6", "Faculty A7"] },
                { time: "1:00 PM - 2:00 PM", subjects: ["Biology"], faculty: ["Faculty A1", "Faculty A2", "Faculty A3"] },
                { time: "2:00 PM - 3:00 PM", subjects: ["English"], faculty: ["Faculty A5", "Faculty A6", "Faculty A7"] },
                { time: "3:00 PM - 4:00 PM", subjects: ["CLAD"], faculty: ["Faculty A1", "Faculty A2", "Faculty A3", "Faculty A4", "Faculty A5", "Faculty A6", "Faculty A7"] }
            ],
            B: [
                { time: "8:00 AM - 9:00 AM", subjects: ["Physics"], faculty: ["Faculty B1", "Faculty B2", "Faculty B3"] },
                { time: "9:00 AM - 10:00 AM", subjects: ["Maths"], faculty: ["Faculty B3", "Faculty B4", "Faculty B5", "Faculty B6"] },
                { time: "10:00 AM - 11:00 AM", subjects: ["Chemistry"], faculty: ["Faculty B4", "Faculty B5", "Faculty B6"] },
                { time: "11:00 AM - 12:00 PM", subjects: ["Computer Science"], faculty: ["Faculty B1", "Faculty B2", "Faculty B3", "Faculty B4", "Faculty B5", "Faculty B6", "Faculty B7"] },
                { time: "1:00 PM - 2:00 PM", subjects: ["CLAD"], faculty: ["Faculty B1", "Faculty B2", "Faculty B3"] },
                { time: "2:00 PM - 3:00 PM", subjects: ["English"], faculty: ["Faculty B5", "Faculty B6", "Faculty B7"] },
                { time: "3:00 PM - 4:00 PM", subjects: ["Biology"], faculty: ["Faculty B1", "Faculty B2", "Faculty B3", "Faculty B4", "Faculty B5", "Faculty B6", "Faculty B7"] }
            ],
            C: [
                { time: "8:00 AM - 9:00 AM", subjects: ["Physics"], faculty: ["Faculty C1", "Faculty C2", "Faculty C3"] },
                { time: "9:00 AM - 10:00 AM", subjects: ["Maths"], faculty: ["Faculty C3", "Faculty C4", "Faculty C5", "Faculty C6"] },
                { time: "10:00 AM - 11:00 AM", subjects: ["Chemistry"], faculty: ["Faculty C4", "Faculty C5", "Faculty C6"] },
                { time: "11:00 AM - 12:00 PM", subjects: ["Computer Science"], faculty: ["Faculty C1", "Faculty C2", "Faculty C3", "Faculty C4", "Faculty C5", "Faculty C6", "Faculty C7"] },
                { time: "1:00 PM - 2:00 PM", subjects: ["CLAD"], faculty: ["Faculty C1", "Faculty C2", "Faculty C3"] },
                { time: "2:00 PM - 3:00 PM", subjects: ["English"], faculty: ["Faculty C5", "Faculty C6", "Faculty C7"] },
                { time: "3:00 PM - 4:00 PM", subjects: ["Biology"], faculty: ["Faculty C1", "Faculty C2", "Faculty C3"] }
            ]
        };

        let selectedSet = '';

        function loadTimetable() {
            selectedSet = document.getElementById("setSelection").value;
            if (selectedSet) {
                document.getElementById("timetableContainer").style.display = "block";
                document.getElementById("selectedSet").textContent = selectedSet;
                document.getElementById("facultyTableContainer").style.display = "none";

                const timeSlots = sets[selectedSet];
                const timetableGrid = document.getElementById("timetableGrid");
                timetableGrid.innerHTML = "";

                timeSlots.forEach((slot, index) => {
                    const slotDiv = document.createElement("div");
                    slotDiv.classList.add("timetable-cell", "fade-in");
                    slotDiv.innerHTML = `
                        <div class="time-slot">
                            <i class="far fa-clock"></i> ${slot.time}
                        </div>
                        <div class="subject-list">
                            <i class="fas fa-book"></i> ${slot.subjects.join(", ")}
                        </div>
                        <div class="form-group">
                            <select id="slot${index}" class="form-control">
                                <option value="">Select Faculty</option>
                                ${slot.faculty.map(faculty => `<option value="${faculty}">${faculty}</option>`).join("")}
                            </select>
                        </div>
                    `;
                    timetableGrid.appendChild(slotDiv);
                });
            }
        }

        function generateTimetable() {
            const timeSlots = sets[selectedSet];
            let isValid = true;
            let selectedFaculties = [];
            const errorMessage = document.getElementById("error_message");
            errorMessage.textContent = "";

            for (let i = 0; i < timeSlots.length; i++) {
                const selectedFaculty = document.getElementById(`slot${i}`).value;
                if (!selectedFaculty) {
                    isValid = false;
                    break;
                } else {
                    selectedFaculties.push({
                        time: timeSlots[i].time,
                        subject: timeSlots[i].subjects[0],
                        faculty: selectedFaculty
                    });
                }
            }

            if (!isValid) {
                errorMessage.textContent = "Please select a faculty for each time slot.";
                return;
            }

            document.getElementById("timetableContainer").style.display = "none";
            document.getElementById("facultyTableContainer").style.display = "block";
            document.getElementById("facultySet").textContent = selectedSet;

            const facultyTable = document.getElementById("facultyTable").getElementsByTagName("tbody")[0];
            facultyTable.innerHTML = "";
            
            selectedFaculties.forEach(selection => {
                const row = facultyTable.insertRow();
                const timeCell = row.insertCell(0);
                const subjectCell = row.insertCell(1);
                const facultyCell = row.insertCell(2);
                
                timeCell.innerHTML = `<i class="far fa-clock"></i> ${selection.time}`;
                subjectCell.innerHTML = `<i class="fas fa-book"></i> ${selection.subject}`;
                facultyCell.innerHTML = `<i class="fas fa-user"></i> ${selection.faculty}`;
            });
        }

        function modifyTimetable() {
            document.getElementById("facultyTableContainer").style.display = "none";
            document.getElementById("timetableContainer").style.display = "block";
            document.getElementById("error_message").textContent = "";
        }
    </script>
</body>
</html>
